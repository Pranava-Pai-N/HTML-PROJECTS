<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dropdown List with Background Images</title>
  <style>
    /* Styles for the dropdown container */
    .dropdown {
      position: relative;
      display: inline-block;
      font-family: Arial, sans-serif;
    }

    /* Style for the dropdown button */
    .dropdown-button {
      background-color: #f7f7f7;
      color: #333;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s, color 0.3s;
    }

    /* Hover effect for the dropdown button */
    .dropdown-button:hover {
      background-color: #e0e0e0;
    }

    /* Styles for the dropdown content */
    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #fff;
      min-width: 160px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      border: 1px solid #ddd;
      border-radius: 5px;
      z-index: 1;
    }

    /* Style for the dropdown options */
    .dropdown-content a {
      color: #333;
      padding: 10px 20px;
      display: block;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.3s, color 0.3s;
    }

    /* Hover effect for the dropdown options */
    .dropdown-content a:hover {
      background-color: #f0f0f0;
    }

    /* Style for when dropdown is shown */
    .dropdown:hover .dropdown-content {
      display: block;
    }
  </style>
</head>
<body>

<div class="dropdown">
  <button class="dropdown-button">Select an Option</button>
  <div class="dropdown-content">
    <a href="#">Option 1</a>
    <a href="#">Option 2</a>
    <a href="#">Option 3</a>
  </div>
</div>

</body>
</html>
